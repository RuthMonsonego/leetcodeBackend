services:
  mysql:
    image: mysql:8.0
    container_name: my_mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: questions_db        
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_app_container
    environment:
      DB_USER: root
      DB_PASSWORD: 1234
      DB_HOST: mysql
    depends_on:
      - mysql
    ports:
      - "8080:8080" 

volumes:
  mysql-data:
