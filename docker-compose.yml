version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: questions_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    command: ["/wait-for-it.sh", "mysql:3306", "--timeout=60", "--", "/main"]
    networks:
      - app-network
      
networks:
  default:
    external: true
  app-network:
    driver: bridge

volumes:
  mysql_data:
